# Continuous Deployment — al hacer push a main, despliega al servidor Ubuntu
# Requiere los siguientes secrets configurados en GitHub:
#   SSH_HOST         → IP o dominio del Ubuntu (ej: profelink.pyecommerce.com)
#   SSH_USER         → usuario SSH (ej: profelink)
#   SSH_PRIVATE_KEY  → clave privada SSH completa (incluido BEGIN/END)
name: Deploy

on:
  push:
    branches: [main]
  # Permite disparar manualmente desde la pestaña Actions
  workflow_dispatch:

# Cancela despliegues previos en cola si llega uno nuevo
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy a Ubuntu
    runs-on: ubuntu-latest
    # Solo corre si CI pasó (depende del workflow ci.yml)
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Desplegar en el servidor
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ~/profelink-mvp
            echo "→ git pull"
            git fetch origin main
            git reset --hard origin/main
            echo "→ npm install"
            npm ci --omit=dev
            npm install --no-save typescript @types/node @types/react
            echo "→ prisma generate"
            npx prisma generate
            echo "→ build"
            rm -rf .next
            npm run build
            echo "→ pm2 restart"
            pm2 restart profelink --update-env
            pm2 save
            echo "✅ Deploy completado"
          EOF

      - name: Verificar que la app responde
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://profelink.pyecommerce.com/)
          if [ "$STATUS" != "200" ]; then
            echo "❌ La app no responde 200 (status: $STATUS)"
            exit 1
          fi
          echo "✅ App respondiendo correctamente"
